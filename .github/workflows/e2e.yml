name: e2e

on:
  pull_request:
    branches: [v3]
    types: [labeled, synchronize]
  push:
    branches: [v3]

permissions:
  contents: read

jobs:
  e2e:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: RabbitMQ E2E tests
        run: pnpm --filter @serviceconnect/rabbitmq test:e2e
